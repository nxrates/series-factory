<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Series Factory">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e11"/>
      <stop offset="1" stop-color="#14181d"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#FDB436" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#FDB436" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <!-- renko staircase motif -->
  <g stroke="#FDB436" stroke-width="2" fill="url(#bars)" opacity="0.85">
    <rect x="880"  y="208" width="44" height="44"/>
    <rect x="928"  y="164" width="44" height="44"/>
    <rect x="976"  y="120" width="44" height="44"/>
    <rect x="1024" y="164" width="44" height="44" fill="none" stroke-opacity="0.55"/>
    <rect x="1072" y="120" width="44" height="44"/>
    <rect x="1120" y="76"  width="44" height="44"/>
  </g>
  <!-- baseline grid hint -->
  <g stroke="#2a2f36" stroke-width="1">
    <line x1="64" y1="256" x2="1216" y2="256"/>
    <line x1="64" y1="196" x2="840" y2="196" stroke-dasharray="2 6"/>
    <line x1="64" y1="136" x2="840" y2="136" stroke-dasharray="2 6"/>
  </g>
  <!-- wordmark -->
  <text x="64" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="700" fill="#f4f4f2" letter-spacing="1">Series Factory</text>
  <text x="66" y="196" font-family="Menlo, Consolas, monospace" font-size="22" fill="#9aa3ad" letter-spacing="3">TICK → BAR → RENKO · MITCH-NATIVE TIME SERIES</text>
  <text x="66" y="240" font-family="Menlo, Consolas, monospace" font-size="16" fill="#FDB436" letter-spacing="4">NX RATES</text>
</svg>
